name: Deploy Weather App with Secret Key

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject API Key into script.js
        run: |
          node <<'NODE'
          const fs = require('fs');

          const key = process.env.API_KEY?.trim();
          if (!key) {
            throw new Error('WEATHER_API_KEY secret is missing or empty');
          }

          const file = 'script.js';
          const source = fs.readFileSync(file, 'utf8');
          const placeholder = '"WEATHER_API_KEY_PLACEHOLDER"';

          if (!source.includes(placeholder)) {
            throw new Error('WEATHER_API_KEY placeholder was not found in script.js');
          }

          const updated = source.replace(
            placeholder,
            JSON.stringify(key),
          );

          fs.writeFileSync(file, updated);
          NODE
        env:
          API_KEY: ${{ secrets.WEATHER_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
